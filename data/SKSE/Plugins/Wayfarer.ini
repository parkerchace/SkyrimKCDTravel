; Wayfarer — KCD-inspired immersive travel. Default configuration.
; MCM Helper overrides (Data/MCM/Settings/Wayfarer.ini) take priority over this file.

[Master]
; Master switch. false = vanilla fast travel, untouched (compatibility escape hatch).
bEnabled=1
; Force the Papyrus arrive-then-waylay fallback even if the C++ hook installed. Troubleshooting.
bForceFallback=0

[Journey]
; In-game hours that pass per 100,000 world units of straight-line distance.
fHoursPer100k=2.0
; Overlay pacing speeds (world units/sec of simulated travel). Reserved for the v1.1 map overlay.
fOnFootSpeed=12000.0
fCartSpeed=20000.0
; Number of encounter checks rolled across a full journey.
iCheckpoints=4
; Block starting travel while over-encumbered (KCD parity).
bBlockWhenOverEncumbered=1

[Encounters]
; TESTING: 100 = every trip fires an event (revert to ~5-8 for shipping).
fBaseChance=100.0
; Encounter chance multiplier at night (18:00-06:00).
fNightMultiplier=1.5
; Cap encounters per journey.
iMaxPerJourney=1
; 0 = own pool only, 1 = vanilla Story Manager only, 2 = hybrid.
iSource=2
; Base chance (0-100) to slip past when choosing to avoid; Sneak shifts it.
fAvoidBaseChance=45.0
; Relative weights for which KIND of event fires (proportional, not %). 0 = disable that kind.
fWeightCombat=50.0
fWeightTraveler=15.0
fWeightDiscovery=15.0
fWeightMoral=0.0
fWeightHazard=20.0
; Upper cap on hostiles per combat encounter.
iActorCount=5
; Solitary predators (bear/sabre cat) come alone; % chance one brings a second. Wolves/gangs ignore this.
fPairChance=10.0
; Base-form FormIDs (local, in sActorPlugin) spawned for combat encounters.
; Defaults = vanilla leveled bandit/wolf lists (resolve to level-scaled NPCs):
;   0x00039CFC LCharBanditMelee1H, 0x0003DEC8 LCharBanditMelee2H,
;   0x0001A348 LCharBanditMissileNordM (archer), 0x000B83C2 LCharWolf.
; Set any to 0 to disable that slot; point them at other lists/NPCs to customize.
iActorForm0=0x00039CFC
iActorForm1=0x0003DEC8
iActorForm2=0x0001A348
iActorForm3=0x000B83C2
sActorPlugin=Skyrim.esm

[Danger]
; Leaving the road (avoid / find another way) is dangerous. Chance (0-100) it drops you into a fight.
fChance=85.0
; What the danger is (relative weights, 0 = disabled).
fWeightAnimals=25.0
fWeightMonsters=20.0
fWeightBandits=25.0
fWeightRobbers=20.0
fWeightDragons=10.0

[Display]
; Show the on-screen travel overlay/notifications while a journey resolves.
bShowOverlay=1
; Real seconds the player arrow takes to slide across the map on a journey.
fMapTravelSeconds=12.0
; Pan the world-map camera to follow the sliding arrow (KCD-style).
bMapCameraFollow=1
